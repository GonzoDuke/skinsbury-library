<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Carnegie home-screen icon. Mirrors the sidebar TartanLogo: a navy
       base with horizontal warp + vertical weft stripes in the five clan
       colors (navy / green / red / black / gold), a white "C" centered
       on top with a faint dark stroke halo so it stays readable over
       the busiest crossings.

       Coordinates here are 16× the values in components/Tartan.tsx so
       the visual match is exact. The corner radius (128 = 25% of the
       canvas) matches the sidebar logo's 8 / 32 ratio. The "C" glyph
       sits at the centre, well inside the maskable safe zone, so the
       manifest's `purpose: "any maskable"` icon works on both square
       and circular OS masks. -->
  <defs>
    <clipPath id="carnegie-icon-clip">
      <rect width="512" height="512" rx="128"/>
    </clipPath>
  </defs>
  <g clip-path="url(#carnegie-icon-clip)" shape-rendering="crispEdges">
    <rect width="512" height="512" fill="#1B3A5C"/>

    <!-- Horizontal stripes (warp) -->
    <rect x="0" y="32"  width="512" height="32" fill="#C4A35A" opacity="0.55"/>
    <rect x="0" y="112" width="512" height="48" fill="#2D5A3A" opacity="0.5"/>
    <rect x="0" y="208" width="512" height="80" fill="#141414" opacity="0.55"/>
    <rect x="0" y="336" width="512" height="48" fill="#B83232" opacity="0.55"/>
    <rect x="0" y="432" width="512" height="32" fill="#C4A35A" opacity="0.55"/>

    <!-- Vertical stripes (weft) -->
    <rect x="48"  y="0" width="32" height="512" fill="#C4A35A" opacity="0.4"/>
    <rect x="144" y="0" width="48" height="512" fill="#2D5A3A" opacity="0.4"/>
    <rect x="240" y="0" width="80" height="512" fill="#141414" opacity="0.45"/>
    <rect x="368" y="0" width="48" height="512" fill="#B83232" opacity="0.4"/>
    <rect x="464" y="0" width="32" height="512" fill="#C4A35A" opacity="0.4"/>
  </g>

  <!-- "C" glyph. Monospace stack so the letter reads correctly even when
       the OS doesn't load JetBrains Mono (PWA icons commonly render in
       environments without web font support). paint-order: stroke gives
       the letter a thin dark halo so it stays legible over the busiest
       tartan crossings. -->
  <text
    x="256"
    y="352"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'Courier New', ui-monospace, monospace"
    font-size="256"
    font-weight="600"
    fill="#FFFFFF"
    style="paint-order: stroke; stroke: rgba(20,20,20,0.55); stroke-width: 11.2">C</text>
</svg>
